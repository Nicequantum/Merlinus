<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="mb-canvas" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#121218"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="mb-ambient" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="rgba(220, 228, 236, 0.12)"/>
      <stop offset="72%" stop-color="rgba(220,228,236,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="mb-ring-metal" x1="14%" y1="10%" x2="86%" y2="90%">
      <stop offset="0%" stop-color="#f4f6f9"/>
      <stop offset="38%" stop-color="#b8bec8"/>
      <stop offset="100%" stop-color="#5a626c"/>
    </linearGradient>
    <linearGradient id="mb-star-metal" x1="32%" y1="6%" x2="68%" y2="94%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#d0d6de"/>
      <stop offset="100%" stop-color="#6e7884"/>
    </linearGradient>
    <linearGradient id="mb-star-spec" x1="40%" y1="0%" x2="60%" y2="38%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="mb-emblem-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="rgba(210,218,226,0.22)"/>
    </filter>
    <filter id="mb-ring-emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
    <filter id="mb-star-emboss" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#mb-canvas)"/>
  <circle cx="512" cy="512" r="430" fill="url(#mb-ambient)"/>
  <g filter="url(#mb-emblem-glow)">
    <g filter="url(#mb-ring-emboss)">
      <circle cx="512" cy="512" r="392" fill="none" stroke="url(#mb-ring-metal)" stroke-width="20"/>
      <circle cx="512" cy="512" r="383" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    </g>
    <g filter="url(#mb-star-emboss)">
      <path fill="url(#mb-star-metal)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(0 512 512)"/>
      <path fill="url(#mb-star-metal)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(120 512 512)"/>
      <path fill="url(#mb-star-metal)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(240 512 512)"/>
      <g opacity="0.38">
        <path fill="url(#mb-star-spec)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(0 512 512)"/>
      <path fill="url(#mb-star-spec)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(120 512 512)"/>
      <path fill="url(#mb-star-spec)" d="M 512 198 L 538 496 L 512 512 L 486 496 Z" transform="rotate(240 512 512)"/>
      </g>
    </g>
  </g>
</svg>
