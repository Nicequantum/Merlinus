<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="merlin-bg" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#181820"/>
      <stop offset="55%" stop-color="#0c0c10"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <radialGradient id="merlin-vignette" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#00adef" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#00adef" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="merlin-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ee9ff"/>
      <stop offset="22%" stop-color="#00adef"/>
      <stop offset="78%" stop-color="#0077a8"/>
      <stop offset="100%" stop-color="#003d5c"/>
    </linearGradient>
    <radialGradient id="merlin-glass" cx="38%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#2a2a38"/>
      <stop offset="55%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <linearGradient id="merlin-chrome" x1="28%" y1="12%" x2="72%" y2="92%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#f0f4fa"/>
      <stop offset="42%" stop-color="#c5ced9"/>
      <stop offset="68%" stop-color="#8f9aad"/>
      <stop offset="100%" stop-color="#5c6675"/>
    </linearGradient>
    <linearGradient id="merlin-chrome-shine" x1="20%" y1="0%" x2="55%" y2="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="merlin-ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a7585" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#eef2f8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6a7585" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="merlin-bubble-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="-4" stdDeviation="8" flood-color="#00adef" flood-opacity="0.28"/>
    </filter>
    <filter id="merlin-star-depth" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App icon canvas -->
  <rect width="1024" height="1024" rx="230" fill="url(#merlin-bg)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#merlin-vignette)"/>

  <g filter="url(#merlin-bubble-shadow)">
    <!-- Raised bubble rim -->
    <circle cx="512" cy="512" r="400" fill="none" stroke="url(#merlin-rim)" stroke-width="26"/>
    <!-- Glass dome -->
    <circle cx="512" cy="512" r="372" fill="url(#merlin-glass)" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
    <!-- Specular highlight -->
    <ellipse cx="430" cy="390" rx="210" ry="120" fill="rgba(255,255,255,0.09)"/>
    <path
      d="M 268 410 A 250 250 0 0 1 756 410"
      fill="none"
      stroke="rgba(255,255,255,0.28)"
      stroke-width="20"
      stroke-linecap="round"
    />
  </g>

  <!-- Emblem ring -->
  <circle cx="512" cy="512" r="292" fill="none" stroke="url(#merlin-ring)" stroke-width="9"/>
  <circle cx="512" cy="512" r="292" fill="none" stroke="rgba(0,173,239,0.18)" stroke-width="3"/>

  <!-- Three-pointed star (Mercedes-inspired) -->
  <g filter="url(#merlin-star-depth)">
    <path
      fill="url(#merlin-chrome)"
      d="M 512 314
         L 657.5 428
         L 683.4 611
         L 512 680
         L 340.6 611
         L 366.5 428
         Z"
    />
    <path
      fill="#07070b"
      opacity="0.9"
      d="M 512 378
         L 612 462
         L 628 578
         L 512 622
         L 396 578
         L 412 462
         Z"
    />
    <path
      fill="url(#merlin-chrome-shine)"
      d="M 512 314 L 580 395 L 512 420 L 444 395 Z"
      opacity="0.55"
    />
  </g>
</svg>