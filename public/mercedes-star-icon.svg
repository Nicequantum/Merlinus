<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ee0ff"/>
      <stop offset="45%" stop-color="#00adef"/>
      <stop offset="100%" stop-color="#006fa0"/>
    </linearGradient>
    <linearGradient id="bubbleInner" x1="20%" y1="15%" x2="80%" y2="85%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#00adef" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#00adef" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00adef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star" x1="30%" y1="20%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#e8eef5"/>
      <stop offset="70%" stop-color="#b8c4d4"/>
      <stop offset="100%" stop-color="#8a96a8"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#00adef" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <ellipse cx="512" cy="470" rx="430" ry="390" fill="url(#glow)"/>

  <!-- Raised bubble ring -->
  <circle cx="512" cy="512" r="392" fill="none" stroke="url(#bubble)" stroke-width="28"/>
  <circle cx="512" cy="512" r="360" fill="url(#bubbleInner)" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <!-- Highlight arc (glass bubble) -->
  <path
    d="M 280 360 A 240 240 0 0 1 744 360"
    fill="none"
    stroke="rgba(255,255,255,0.22)"
    stroke-width="22"
    stroke-linecap="round"
  />

  <!-- Mercedes-Benz three-pointed star -->
  <g filter="url(#starShadow)">
    <path
      fill="url(#star)"
      d="M 512 248
         L 668 420
         L 842 420
         L 704 536
         L 776 712
         L 512 576
         L 248 712
         L 320 536
         L 182 420
         L 356 420
         Z"
    />
    <path
      fill="#08080a"
      opacity="0.92"
      d="M 512 318
         L 620 438
         L 748 438
         L 646 528
         L 694 648
         L 512 548
         L 330 648
         L 378 528
         L 276 438
         L 404 438
         Z"
    />
  </g>

  <!-- Inner ring (emblem circle) -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="rgba(200,210,225,0.35)" stroke-width="10"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="rgba(0,173,239,0.25)" stroke-width="4"/>
</svg>