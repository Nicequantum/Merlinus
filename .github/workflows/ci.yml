name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      SESSION_SECRET: ci-test-session-secret-min-32-chars
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      KV_REST_API_URL: https://ci-kv.example.com
      KV_REST_API_TOKEN: ci-kv-token
      GROK_API_KEY: ci-grok-key
      NEXT_PUBLIC_SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      ADMIN_SEED_PASSWORD: ci-admin-seed-password-min8
      TECH_SEED_PASSWORD: ci-tech-seed-password-min8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # H-2: Gate tenant isolation and route flows on every merge (requires seeded accounts).
      - name: Seed database for integration tests
        run: npm run db:seed

      - name: Integration tests
        run: npx tsx --import ./tests/setup/preload.mjs --test tests/integration/**/*.test.ts
        env:
          # Fake KV URLs make /api/health return 503 (probe error). CI has no real KV; use in-memory fallback.
          KV_REST_API_URL: ''
          KV_REST_API_TOKEN: ''

      - name: Production build
        run: npm run build

      - name: Ready to deploy
        run: npm run ready-to-deploy
        env:
          NODE_ENV: production
          VERCEL_ENV: production